function reps(str){
	var strReg1 =/"/g;
	var strReg2=/'/g;
	var strReg3=/</g;
	var strReg4=/>/g;
	var ret=str.replace(strReg1, "&quot;");
	ret=ret.replace(strReg2, "&acute;");
	ret=ret.replace(strReg3, "&lt;;");
	ret=ret.replace(strReg4, "&gt;");
	return ret;
}

		new Event(e).stop();
        if (this.hasClass('atab2'))
		{
			this.removeClass(this.className);
			this.addClass('atab1');
			taba2.removeClass(taba2.className);
			taba2.addClass('atab2');
			$('mbc_main_d_tab1').style.display="";
			$('mbc_main_d_tab2').style.display="none";

	});

		event = new Event(event);
		if (event.key == 'up') ocx.ControlPtz(0,0,$('ps').value,0,1);

	});

	inilanguage();
	getSetting();
    setUserName($('username'),$('password'));
    getChnList();
    gdomready=1;
});

        //clearTimeout(gt);

<script language="javascript" for="ocx" event="StateChanged(ci,ps,wid)">
	var oc;
	
	if (ci !=-1 && ci!=32){
		oc=$('c' + ci);
		if (ps==0){            
            oc.removeClass(oc.className);
			oc.addClass('cl1');
		}
		if (ps==1){
			oc.removeClass('cl1');
			oc.addClass('cl2');
		}
		if (ps==3){
			oc.removeClass('cl1');
			oc.addClass('cl3');
		}
	}
	if (wid == gwid){
		if (ps==3||ps==5)
		{
			$('mbb_b_plc').setStyles({position:'relative',top:0});
		}
		else
